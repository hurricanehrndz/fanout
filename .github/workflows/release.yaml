---
name: Release

on:
  workflow_run:
    types:
      - completed
    workflows:
      - "ci"
jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' && contains(github.event.workflow_run.head_branch, 'release/') }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          ref: refs/heads/${{github.event.workflow_run.head_branch}}

      - name: Get tag
        id: get-tag-step
        env:
          BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: echo "tag=${BRANCH#release/}" >> "$GITHUB_OUTPUT"

      - name: Push tag ${{ steps.get-tag-step.outputs.tag }}
        env:
          TAG: ${{ steps.get-tag-step.outputs.tag }}
        run: |
          git status
          git tag "$TAG"
          git push origin "$TAG" -f
      - name: Create release ${{ steps.get-tag-step.outputs.tag }}
        env:
          GH_TOKEN: ${{ secrets.NSM_BOT_GITHUB_TOKEN }}
          TAG: ${{ steps.get-tag-step.outputs.tag }}
        run: |
          gh release create "$TAG" \
            --title "$TAG" \
            --notes "" \
            --verify-tag

  docker:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' && contains(github.event.workflow_run.head_branch, 'release/') }}
    steps:
      - name: "Checkout"
        uses: actions/checkout@v7
        with:
          ref: refs/heads/${{github.event.workflow_run.head_branch}}

      - uses: actions/setup-go@v6
        with:
          go-version: 1.26.5
      - name: "Build coredns binary"
        run: |
          go -C coredns build -o coredns .

      - name: "Set up Docker Buildx"
        uses: docker/setup-buildx-action@v4

      - name: "Login to GitHub Container Registry"
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get tag
        id: get-tag-step
        env:
          BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: echo "tag=${BRANCH#release/}" >> "$GITHUB_OUTPUT"

      - name: "Build and push"
        uses: docker/build-push-action@v7
        with:
          file: coredns/Dockerfile
          context: .
          push: true
          tags: "ghcr.io/${{ github.repository_owner }}/coredns:${{ steps.get-tag-step.outputs.tag }}"
