---
name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Tag to create
        required: true
        type: string

permissions: {}

jobs:
  create-release:
    name: Create source release
    runs-on: ubuntu-latest
    if: ${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
    permissions:
      contents: write
    steps:
      - name: Check out dispatch commit
        uses: actions/checkout@v7
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Validate tag
        env:
          TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          git check-ref-format "refs/tags/$TAG"
          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null; then
            echo "Tag already exists: $TAG" >&2
            exit 1
          else
            status=$?
            if ((status != 2)); then
              exit "$status"
            fi
          fi

      - name: Create and push tag
        env:
          TAG: ${{ inputs.tag }}
        run: |
          git tag -- "$TAG"
          git push origin "refs/tags/$TAG"

      - name: Create source release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag }}
        run: |
          gh release create \
            --title "$TAG" \
            --notes "" \
            --verify-tag \
            -- "$TAG"
