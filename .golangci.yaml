---
version: "2"
run:
  issues-exit-code: 1
  tests: true
linters:
  default: none
  enable:
    - bodyclose
    - depguard
    - dogsled
    - dupl
    - errcheck
    - funlen
    - gochecknoinits
    - goconst
    - gocritic
    - gocyclo
    - gosec
    - govet
    - ineffassign
    - misspell
    - nakedret
    - revive
    - staticcheck
    - unconvert
    - unparam
    - unused
    - whitespace
  settings:
    depguard:
      rules:
        default:
          deny:
            - pkg: errors
              desc: Please use "github.com/pkg/errors" instead of "errors" in go imports
    dupl:
      threshold: 150
    errcheck:
      check-type-assertions: false
      check-blank: false
    goconst:
      min-len: 2
      min-occurrences: 2
    gocritic:
      enabled-checks:
        - appendCombine
        - boolExprSimplify
        - builtinShadow
        - commentedOutCode
        - commentedOutImport
        - docStub
        - dupImport
        - emptyFallthrough
        - emptyStringTest
        - equalFold
        - evalOrder
        - hexLiteral
        - hugeParam
        - importShadow
        - indexAlloc
        - initClause
        - methodExprCall
        - nestingReduce
        - nilValReturn
        - octalLiteral
        - paramTypeCombine
        - ptrToRefParam
        - rangeExprCopy
        - rangeValCopy
        - regexpPattern
        - sloppyReassign
        - stringXbytes
        - typeAssertChain
        - typeUnparen
        - unlabelStmt
        - unnamedResult
        - unnecessaryBlock
        - weakCond
        - yodaStyleExpr
    gocyclo:
      min-complexity: 15
    govet:
      enable:
        - shadow
      settings:
        printf:
          funcs:
            - (github.com/sirupsen/logrus.FieldLogger).Infof
            - (github.com/sirupsen/logrus.FieldLogger).Warnf
            - (github.com/sirupsen/logrus.FieldLogger).Errorf
            - (github.com/sirupsen/logrus.FieldLogger).Fatalf
    misspell:
      locale: US
    nakedret:
      max-func-lines: 30
    prealloc:
      simple: true
      range-loops: true
      for-loops: false
    unparam:
      check-exported: false
  exclusions:
    generated: lax
    rules:
      # Test teardown errors and repeated table literals are intentionally ignored.
      - linters:
          - errcheck
          - goconst
        path: _test\.go
      # Tests may be long.
      - linters:
          - funlen
        path: setup_test.go
      # CoreDNS plugins require an init function.
      - linters:
          - gochecknoinits
        path: setup.go
      # parseValue intentionally has one case per plugin directive.
      - linters:
          - funlen
          - gocyclo
        path: setup.go
      # The test binds to all interfaces to allocate a port.
      - linters:
          - gosec
        path: fanout_test.go
      # Tests may be complex.
      - linters:
          - gocyclo
        path: setup_test.go
      # Keep the existing request flow intact during the tooling migration.
      - linters:
          - funlen
          - gocyclo
        path: client.go
      # gocritic conflicts with other enabled linters here.
      - linters:
          - gocritic
        path: client.go
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/networkservicemesh/sdk
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
